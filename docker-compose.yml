services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      scylla:
        condition: service_started
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      PUBLIC_URL: http://localhost:13000
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:13000
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/raterlog?sslmode=disable
      SCYLLA_HOSTS: scylla:9042
      SCYLLA_KEYSPACE: raterlog
      COOKIE_SECURE: "false"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: Raterlog <noreply@raterlog.dev>
    ports:
      - "18080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:18080
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:18080
    ports:
      - "13000:3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raterlog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raterlog"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  scylla:
    image: scylladb/scylla:6.2
    command: ["--smp", "1", "--memory", "750M", "--overprovisioned", "1"]
    ports:
      - "19042:9042"
    volumes:
      - scylla-data:/var/lib/scylla

  mailhog:
    image: mailhog/mailhog
    ports:
      - "11025:1025"
      - "18025:8025"

volumes:
  pgdata:
  scylla-data:
